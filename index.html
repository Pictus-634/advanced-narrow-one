<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Narrow One + Input Overlay</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }

  /* UI（クリック無効！） */
  .keys {
    position: absolute;
    top: 20px;
    left: 20px;
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 40px;
    gap: 5px;
    opacity: 0.4;

    pointer-events: none; /* ← 超重要 */
  }

  .key {
    border: 2px solid white;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    background: rgba(255,255,255,0.1);
    transition: 0.08s;
  }

  .active {
    background: rgba(255,255,255,0.85);
    color: black;
    transform: scale(0.95);
  }

  /* WASD配置 */
  .w { grid-column: 2; grid-row: 1; }
  .a { grid-column: 1; grid-row: 2; }
  .s { grid-column: 2; grid-row: 2; }
  .d { grid-column: 3; grid-row: 2; }

  /* Space */
  .space {
    grid-column: 1 / span 3;
    grid-row: 3;
  }
</style>
</head>

<body>

<!-- ゲーム -->
<iframe 
  src="https://narrow.one"
  id="game"
  tabindex="0"
></iframe>

<!-- 入力UI -->
<div class="keys">
  <div class="key w" id="w">W</div>
  <div class="key a" id="a">A</div>
  <div class="key s" id="s">S</div>
  <div class="key d" id="d">D</div>
  <div class="key space" id="space">SPACE</div>
</div>

<script>
const map = {
  w: "w",
  a: "a",
  s: "s",
  d: "d",
  " ": "space"
};

const iframe = document.getElementById("game");

/* クリックしたらゲームにフォーカス */
window.addEventListener("click", () => {
  iframe.focus();
});

/* キー押下 */
window.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();
  if (map[key]) {
    const el = document.getElementById(map[key]);
    if (el) el.classList.add("active");
  }
});

/* キー離す */
window.addEventListener("keyup", (e) => {
  const key = e.key.toLowerCase();
  if (map[key]) {
    const el = document.getElementById(map[key]);
    if (el) el.classList.remove("active");
  }
});
</script>

</body>
</html>
