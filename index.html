<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Narrow One + Input Overlay</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }

  /* ===== UI（絶対に操作を邪魔しない） ===== */
  .keys {
    position: absolute;
    top: 20px;
    left: 20px;
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 40px;
    gap: 6px;
    opacity: 0.35;

    pointer-events: none; /* ←超重要 */
    user-select: none;
  }

  .key {
    border: 2px solid rgba(255,255,255,0.8);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    transition: 0.08s;
  }

  .active {
    background: rgba(255,255,255,0.9);
    color: black;
    transform: scale(0.92);
  }

  /* WASD */
  .w { grid-column: 2; grid-row: 1; }
  .a { grid-column: 1; grid-row: 2; }
  .s { grid-column: 2; grid-row: 2; }
  .d { grid-column: 3; grid-row: 2; }

  /* Space */
  .space {
    grid-column: 1 / span 3;
    grid-row: 3;
  }
</style>
</head>

<body>

<!-- ===== ゲーム ===== -->
<iframe 
  src="https://narrow.one"
  id="game"
  tabindex="0"
></iframe>

<!-- ===== 入力表示 ===== -->
<div class="keys">
  <div class="key w" id="w">W</div>
  <div class="key a" id="a">A</div>
  <div class="key s" id="s">S</div>
  <div class="key d" id="d">D</div>
  <div class="key space" id="space">SPACE</div>
</div>

<script>
/* =========================
   キーマッピング
========================= */
const map = {
  w: "w",
  a: "a",
  s: "s",
  d: "d",
  " ": "space"
};

const pressed = {};

/* =========================
   キー検知（横取り・非干渉）
========================= */
document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();

  if (map[key] && !pressed[key]) {
    pressed[key] = true;
    document.getElementById(map[key])?.classList.add("active");
  }

}, true); // ← capture重要

document.addEventListener("keyup", (e) => {
  const key = e.key.toLowerCase();

  if (map[key]) {
    pressed[key] = false;
    document.getElementById(map[key])?.classList.remove("active");
  }

}, true);


/* =========================
   フォーカス制御（ゲーム優先）
========================= */
const iframe = document.getElementById("game");

/* どこクリックしてもゲームに戻す */
window.addEventListener("click", () => {
  iframe?.focus();
});


/* =========================
   バグ防止リセット
========================= */
function resetKeys() {
  Object.keys(map).forEach(k => {
    pressed[k] = false;
    document.getElementById(map[k])?.classList.remove("active");
  });
}

window.addEventListener("blur", resetKeys);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) resetKeys();
});
</script>

</body>
</html>
